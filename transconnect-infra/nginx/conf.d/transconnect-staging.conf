# ============================================================
# TransConnect STAGING Nginx Site Configuration
# Install to: /etc/nginx/sites-available/transconnect-staging.conf
# Enable with: ln -s /etc/nginx/sites-available/transconnect-staging.conf \
#                     /etc/nginx/sites-enabled/
#
# Domains:
#   staging.transconnect.app        → Web portal  (port 3010)
#   api-staging.transconnect.app    → Backend API (port 5001)
#   admin-staging.transconnect.app  → Admin panel (port 3011)
# ============================================================

# ─── Rate limiting zones (tc_staging_ prefix avoids collisions) ─
limit_req_zone $binary_remote_addr zone=tc_staging_api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=tc_staging_auth:10m rate=5r/m;

# ─── Upstream Definitions ──────────────────────────────────
upstream tc_staging_backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

upstream tc_staging_web {
    server 127.0.0.1:3010;
    keepalive 16;
}

upstream tc_staging_admin {
    server 127.0.0.1:3011;
    keepalive 16;
}

# ─── HTTP → HTTPS Redirect ─────────────────────────────────
server {
    listen 80;
    server_name staging.transconnect.app api-staging.transconnect.app admin-staging.transconnect.app;
    return 301 https://$host$request_uri;
}

# ============================================================
# API — api-staging.transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name api-staging.transconnect.app;

    # SSL — SAN cert covering all staging subdomains
    ssl_certificate     /etc/letsencrypt/live/staging.transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;

    # Rate limit API globally; tighter limit on auth endpoints
    location ~* ^/api/v1/(auth|login|register|otp) {
        limit_req zone=tc_staging_auth burst=10 nodelay;
        proxy_pass http://tc_staging_backend;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }

    location / {
        limit_req zone=tc_staging_api burst=50 nodelay;
        proxy_pass http://tc_staging_backend;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}

# ============================================================
# Admin — admin-staging.transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name admin-staging.transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/staging.transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://tc_staging_admin;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}

# ============================================================
# Web Portal — staging.transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name staging.transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/staging.transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Next.js handles its own static assets
    location /_next/static/ {
        proxy_pass http://tc_staging_web;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://tc_staging_web;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}
