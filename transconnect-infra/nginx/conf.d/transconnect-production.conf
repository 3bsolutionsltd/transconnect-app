# ============================================================
# TransConnect PRODUCTION Nginx Site Configuration
# Install to: /etc/nginx/sites-available/transconnect-production.conf
# Enable with: ln -s /etc/nginx/sites-available/transconnect-production.conf \
#                     /etc/nginx/sites-enabled/
#
# Domains:
#   transconnect.app / www.transconnect.app → Web portal  (port 3000)
#   api.transconnect.app                    → Backend API (port 5000)
#   admin.transconnect.app                  → Admin panel (port 3001)
# ============================================================

# ─── Rate limiting zones (tc_prod_ prefix avoids collisions) ───
limit_req_zone $binary_remote_addr zone=tc_prod_api:10m  rate=30r/s;
limit_req_zone $binary_remote_addr zone=tc_prod_auth:10m rate=5r/m;

# ─── Upstream Definitions ──────────────────────────────────
upstream tc_prod_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

upstream tc_prod_web {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream tc_prod_admin {
    server 127.0.0.1:3001;
    keepalive 16;
}

# ─── HTTP → HTTPS Redirect ─────────────────────────────────
server {
    listen 80;
    server_name transconnect.app www.transconnect.app api.transconnect.app admin.transconnect.app;
    return 301 https://$host$request_uri;
}

# ─── www → apex redirect ───────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://transconnect.app$request_uri;
}

# ============================================================
# API — api.transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name api.transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/api.transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Tight rate limit on auth endpoints
    location ~* ^/api/v1/(auth|login|register|otp) {
        limit_req zone=tc_prod_auth burst=5 nodelay;
        proxy_pass http://tc_prod_backend;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }

    location / {
        limit_req zone=tc_prod_api burst=100 nodelay;
        proxy_pass http://tc_prod_backend;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}

# ============================================================
# Admin — admin.transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name admin.transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/admin.transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://tc_prod_admin;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}

# ============================================================
# Web Portal — transconnect.app
# ============================================================
server {
    listen 443 ssl http2;
    server_name transconnect.app;

    ssl_certificate     /etc/letsencrypt/live/transconnect.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/transconnect.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Cache Next.js static chunks aggressively
    location /_next/static/ {
        proxy_pass http://tc_prod_web;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public static files
    location /public/ {
        proxy_pass http://tc_prod_web;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://tc_prod_web;
        include /etc/nginx/conf.d/_transconnect_proxy_params.conf;
    }
}
