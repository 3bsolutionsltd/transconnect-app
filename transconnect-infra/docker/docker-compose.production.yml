version: '3.8'

# ============================================================
# TransConnect PRODUCTION Environment
# Domain:   transconnect.app / www.transconnect.app
# API:      api.transconnect.app
# Admin:    admin.transconnect.app
# ============================================================

services:
  # ─── PostgreSQL Database ────────────────────────────────
  postgres_prod:
    image: postgres:15-alpine
    container_name: tc_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: transconnect_production
      POSTGRES_USER: transconnect_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ../../transconnect-backend/backups:/backups    # mount backup dir
    networks:
      - prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transconnect_prod -d transconnect_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DB port NOT exposed externally - only accessible within prod_network

  # ─── Redis (session caching / seat locking) ──────────────
  redis_prod:
    image: redis:7-alpine
    container_name: tc_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_prod_data:/data
    networks:
      - prod_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────
  backend_prod:
    build:
      context: ../../transconnect-backend
      dockerfile: Dockerfile
    container_name: tc_backend_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://transconnect_prod:${POSTGRES_PASSWORD}@postgres_prod:5432/transconnect_production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis_prod:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_URL: ${ADMIN_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # SMS
      ESMS_API_KEY: ${ESMS_API_KEY}
      ESMS_USERNAME: ${ESMS_USERNAME:-2057}
      ESMS_SENDER_ID: ${ESMS_SENDER_ID:-TransConnect}
      # Google Maps
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      # Payments (LIVE)
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY}
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY}
      FLUTTERWAVE_ENCRYPTION_KEY: ${FLUTTERWAVE_ENCRYPTION_KEY}
      MTN_MOMO_SUBSCRIPTION_KEY: ${MTN_MOMO_SUBSCRIPTION_KEY}
      MTN_MOMO_USER_ID: ${MTN_MOMO_USER_ID}
      MTN_MOMO_API_KEY: ${MTN_MOMO_API_KEY}
      MTN_MOMO_ENVIRONMENT: production
      AIRTEL_MONEY_CLIENT_ID: ${AIRTEL_MONEY_CLIENT_ID}
      AIRTEL_MONEY_CLIENT_SECRET: ${AIRTEL_MONEY_CLIENT_SECRET}
      AIRTEL_MONEY_ENVIRONMENT: production
      # Feature flags
      ENABLE_ROUTE_SEGMENTS: "true"
      ENABLE_DYNAMIC_SCHEDULING: "true"
      ENABLE_BOOKING_TRANSFERS: "true"
      # Logging
      LOG_LEVEL: warn
      ENABLE_REQUEST_LOGGING: "false"
      # Security
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_MAX: 1000
      RATE_LIMIT_WINDOW: 900000
      # Backup & monitoring
      BACKUP_ENABLED: "true"
      BACKUP_SCHEDULE: "0 2 * * *"
      MONITORING_ENABLED: "true"
    ports:
      - "127.0.0.1:5000:5000"   # Only bind to localhost; Nginx proxies externally
    depends_on:
      postgres_prod:
        condition: service_healthy
      redis_prod:
        condition: service_healthy
    networks:
      - prod_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Admin Dashboard ─────────────────────────────────────
  admin_prod:
    build:
      context: ../../transconnect-admin
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_APP_NAME: "TransConnect Admin"
    container_name: tc_admin_prod
    restart: always
    ports:
      - "127.0.0.1:3001:80"
    depends_on:
      - backend_prod
    networks:
      - prod_network

  # ─── Web Portal (Next.js) ────────────────────────────────
  web_prod:
    build:
      context: ../../transconnect-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL}
    container_name: tc_web_prod
    restart: always
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend_prod
    networks:
      - prod_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_prod_data:
    name: tc_postgres_prod_data
  redis_prod_data:
    name: tc_redis_prod_data

networks:
  prod_network:
    name: tc_prod_network
    driver: bridge
