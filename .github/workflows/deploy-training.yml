# Deploy Training Resource Kit to GitHub Pages
name: Deploy Training Kit

on:
  push:
    branches:
      - main
    paths:
      - 'training/**'
      - '.github/workflows/deploy-training.yml'
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'training'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        timeout-minutes: 10
