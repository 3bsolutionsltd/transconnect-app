name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild of Docker images (no cache)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: staging-deploy
  cancel-in-progress: false    # Don't cancel in-flight deploys

jobs:
  # ─── Run tests before deploying ─────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: transconnect_test
          POSTGRES_USER: transconnect_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: transconnect-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: transconnect-backend
        run: npm ci

      - name: Configure test environment
        working-directory: transconnect-backend
        run: |
          echo "DATABASE_URL=postgresql://transconnect_test:test_password@localhost:5432/transconnect_test" > .env
          echo "JWT_SECRET=test-jwt-secret-at-least-32-characters-long" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Apply DB schema
        working-directory: transconnect-backend
        run: |
          npx prisma generate
          npx prisma db push --force-reset

      - name: Run tests
        working-directory: transconnect-backend
        run: npm test

  # ─── Deploy to VPS over SSH ──────────────────────────────────
  deploy:
    name: Deploy staging
    needs: test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          timeout:  15m
          script: |
            set -e
            cd /opt/transconnect/app
            git fetch origin
            git checkout main
            git pull origin main

            BUILD_FLAG="--build"
            if [ "${{ github.event.inputs.force_build }}" = "false" ]; then
              BUILD_FLAG=""
            fi

            bash transconnect-infra/scripts/deploy-staging.sh $BUILD_FLAG

      - name: Notify deployment status
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} Staging deploy *${{ job.status }}* — `${{ steps.sha.outputs.sha }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
